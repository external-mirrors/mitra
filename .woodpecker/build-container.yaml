when:
  - branch: [main]
    event: [tag, push]

steps:
  build_container_release:
    image: docker.io/woodpeckerci/plugin-kaniko:2.3.2
    when:
      event: tag
    settings:
      registry: codeberg.org
      username: "${CI_REPO_OWNER}"
      password:
        from_secret: codeberg_token
      repo: "${CI_REPO_OWNER}/${CI_REPO_NAME}"
      dockerfile: contrib/docker/Dockerfile
      tags:
        - "${CI_COMMIT_TAG##v}"
        - latest
  build_container:
    image: docker.io/woodpeckerci/plugin-kaniko:2.3.2
    when:
      event: push
    settings:
      registry: codeberg.org
      username: "${CI_REPO_OWNER}"
      password:
        from_secret: codeberg_token
      repo: "${CI_REPO_OWNER}/${CI_REPO_NAME}"
      dockerfile: contrib/docker/Dockerfile
      tags: dev
